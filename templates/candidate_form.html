{% extends 'base.html' %}
{% block title %}{% if candidate %}候補者編集{% else %}候補者登録{% endif %}{% endblock %}
{% block content %}<div class="narrow"><div class="page-head"><div><p class="eyebrow">CANDIDATE</p><h1>{% if candidate %}候補者情報を編集{% else %}候補者を登録{% endif %}</h1></div></div>
<form class="panel form" method="post">
  <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
  <div class="form-grid"><label>氏名 <em>必須</em><input required name="name" value="{{ request.form.get('name', candidate.name if candidate else '') }}"></label><label>メールアドレス <em>必須</em><input required type="email" name="email" value="{{ request.form.get('email', candidate.email if candidate else '') }}"></label><label>電話番号<input name="phone" value="{{ request.form.get('phone', (candidate.phone or '') if candidate else '') }}"></label><label>大学<input name="university" value="{{ request.form.get('university', (candidate.university or '') if candidate else '') }}"></label><label>学部<input name="faculty" value="{{ request.form.get('faculty', (candidate.faculty or '') if candidate else '') }}"></label><label>卒業年度<input type="number" name="graduation_year" value="{{ request.form.get('graduation_year', (candidate.graduation_year or '') if candidate else '') }}"></label><label>週の稼働可能時間<input type="number" min="0" max="168" name="available_hours_per_week" value="{{ request.form.get('available_hours_per_week', candidate.available_hours_per_week if candidate and candidate.available_hours_per_week is not none else '') }}"></label></div>
  <div class="form-actions"><a href="{{ url_for('candidate_detail', candidate_id=candidate.candidate_id) if candidate else url_for('candidates') }}">キャンセル</a><button class="button" type="submit">保存する</button></div>
</form></div>{% endblock %}
