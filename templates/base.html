<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}採用選考管理{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header>
    <a class="brand" href="{{ url_for('dashboard') }}">Recruit Board</a>
    <nav>
      <a href="{{ url_for('dashboard') }}">ダッシュボード</a>
      <a href="{{ url_for('candidates') }}">候補者・応募</a>
      <a class="button small" href="{{ url_for('candidate_new') }}">候補者を登録</a>
    </nav>
  </header>
  <main>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="flash {{ category }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}
    {% block content %}{% endblock %}
  </main>
  <footer>採用選考管理システム</footer>
</body>
</html>
